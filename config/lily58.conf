# =========================
# 🔋 功耗 / 藍牙
# =========================

# 開啟高功率
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 藍牙連線間隔（平衡延遲與功耗）
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# 降低背景掃描耗電
CONFIG_BT_BACKGROUND_SCAN_INTERVAL=1024
CONFIG_BT_BACKGROUND_SCAN_WINDOW=36


# =========================
# 💤 睡眠設定
# =========================

CONFIG_ZMK_SLEEP=y

# 10 分鐘進入睡眠（實用值）
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000


# =========================
# ⌨️ Key Scan（手感 & 穩定）
# =========================

# 比你原本更穩定但仍然快
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10


# =========================
# 🏷️ 裝置名稱
# =========================

CONFIG_ZMK_KEYBOARD_NAME="Lily58"


# =========================
# 🧪 開發功能
# =========================

# 預設關閉（需要再開）
CONFIG_ZMK_STUDIO=n
CONFIG_ZMK_STUDIO_LOCKING=n


# =========================
# 🖱️ Mouse
# =========================

CONFIG_ZMK_POINTING=y
